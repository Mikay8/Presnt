version: 1
applications:
  - appRoot: artifacts/presnt
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10
            - cd /codebuild/output/src*/src/Presnt && pnpm install --no-frozen-lockfile
        build:
          commands:
            - echo "=== PWD ===" && pwd
            - echo "=== find expo binary ===" && find /codebuild -name "expo" -type f 2>/dev/null | head -20
            - echo "=== root node_modules/.bin ===" && ls /codebuild/output/src*/src/Presnt/node_modules/.bin/ 2>/dev/null | grep expo || echo "not found"
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - ../../node_modules/**/*
