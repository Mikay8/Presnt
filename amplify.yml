version: 1
applications:
  - appRoot: artifacts/presnt
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10
            - cd /codebuild/output/src*/src/Presnt && pnpm install --no-frozen-lockfile
        build:
          commands:
            - node_modules/.bin/expo export -p web
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - ../../node_modules/**/*
