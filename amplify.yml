version: 1
applications:
  - appRoot: artifacts/mockup-sandbox
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - cd /codebuild/output/src*/src/Presnt && pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - ../../node_modules/**/*
