kind = "mobile"
previewPath = "/presnt/"
title = "presnt"
version = "1.0.0"
id = "artifacts/presnt"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/presnt/" ]
localPort = 24663

[services.development]
run = "pnpm --filter @workspace/presnt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/presnt", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/presnt", "run", "serve" ]

[services.env]
PORT = "24663"
BASE_PATH = "/presnt/"
